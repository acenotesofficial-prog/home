<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notes Catalog - AceNotes</title>
<link rel="icon" type="image/png" href="../assets/avatars/LOGO.png">
<link rel="manifest" href="/home/manifest.json">
<meta name="theme-color" content="#0f1117">
<script>(function(){var t=null;try{t=localStorage.getItem('acenotes-theme');}catch(e){}if(!t){var m=document.cookie.match(/acenotes-theme=(dark|light)/);if(m)t=m[1];}if(t==='dark')document.documentElement.setAttribute('data-theme','dark');})()</script>
<link rel="stylesheet" href="../assets/css/base.css">
<link rel="stylesheet" href="../assets/css/buy-notes.css">
</head>
<body>

<div id="navbar-mount"></div>

<div class="catalog-page">
  <div class="container">

    <div class="catalog-header">
      <div class="catalog-header-left">
        <h1 class="catalog-title">Notes Catalog</h1>
        <p class="catalog-subtitle">Chapter-wise notes for Classes 6–12 · Board &amp; JEE</p>
      </div>
      <div class="catalog-header-right">
        <span class="catalog-total-badge" id="catalog-total-badge">4 notes</span>
      </div>
    </div>

    <div class="class-filter-row" id="class-filter-row">
      <button class="cls-filter active" data-group="all">All</button>
      <button class="cls-filter" data-group="foundation">Foundation <span>6–8</span></button>
      <button class="cls-filter" data-group="board">Board <span>9–10</span></button>
      <button class="cls-filter" data-group="jee">JEE <span>11–12</span></button>
    </div>

    <div class="class-tabs-wrap">
      <div class="class-tabs" id="class-tabs">
        <button class="ctab ctab-soon" data-cls="6">6<span class="ctab-label">Foundation</span></button>
        <button class="ctab ctab-soon" data-cls="7">7<span class="ctab-label">Foundation</span></button>
        <button class="ctab ctab-soon" data-cls="8">8<span class="ctab-label">Foundation</span></button>
        <button class="ctab ctab-soon" data-cls="9">9<span class="ctab-label">Board</span></button>
        <button class="ctab" data-cls="10">10<span class="ctab-label">Board</span></button>
        <button class="ctab ctab-jee" data-cls="11">11<span class="ctab-label">JEE</span></button>
        <button class="ctab ctab-soon ctab-jee" data-cls="12">12<span class="ctab-label">JEE</span></button>
      </div>
    </div>

    <div class="board-row" id="board-row" style="display:none;">
      <button class="board-chip" data-board="CBSE">CBSE</button>
      <button class="board-chip" data-board="ICSE">ICSE</button>
    </div>

    <div class="subject-row-wrap" id="subject-row-wrap" style="display:none;">
      <div class="subject-row" id="subject-row"></div>
    </div>

    <div id="catalog-content">
      <div class="catalog-placeholder" id="placeholder">
        <div class="placeholder-icon">📚</div>
        <h3>Select a class above</h3>
        <p>Your notes will appear here.</p>
      </div>
      <div id="sections-wrap" style="display:none;"></div>
    </div>

  </div>
</div>

<!-- Toast -->
<div id="catalog-toast"></div>

<script src="../assets/acenotes.js"></script>
<script>
renderNavbar({ base: '../', cur: 'catalog' });

window._ownedNoteIds = new Set();
// Load purchased notes for current user
(async () => {
  try {
    const fbUrl = new URL('../assets/firebase.js', location.href).href;
    const { auth, db } = await import(fbUrl);
    const { onAuthStateChanged } = await import('https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js');
    const { doc, getDoc } = await import('https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js');
    onAuthStateChanged(auth, async user => {
      if (!user) return;
      const snap = await getDoc(doc(db, 'user_notes', user.uid));
      if (snap.exists()) {
        (snap.data().items || []).forEach(i => {
          // store both id and title for matching
          if (i.id !== undefined) window._ownedNoteIds.add(String(i.id));
          if (i.title) window._ownedNoteIds.add(i.title);
        });
        if (currentCls) renderSections();
      }
    });
  } catch(e) {}
})();

const SUBJECTS_6_10 = ['English Language'];
const SUBJECTS_JEE  = ['Physics','Chemistry','Mathematics'];
const SUBJECT_ICONS = {'Mathematics':'📐','Physics':'⚡','Chemistry':'🧪','English Language':'📝','English Literature':'📚','Biology':'🧬','Computer':'💻','History':'🏛️','Geography':'🌍'};

let currentCls = null, currentBoard = null, activeSub = 'all';
let toastTimer = null;

function isDark() { return document.documentElement.getAttribute('data-theme') === 'dark'; }

function showToast(msg) {
  const t = document.getElementById('catalog-toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
}

function noteCard(note) {
  const src = note.cover ? (isDark() ? note.cover.dark : note.cover.light) : null;
  const cover = src
    ? `<div class="nc-cover"><img data-light="${note.cover.light}" data-dark="${note.cover.dark}" src="${src}" alt="${note.title}"><div class="nc-overlay"><span>View Details</span></div></div>`
    : `<div class="nc-cover nc-cover-empty"><span>${SUBJECT_ICONS[note.subject]||'📚'}</span><div class="nc-overlay"><span>View Details</span></div></div>`;
  const owned = window._ownedNoteIds && (window._ownedNoteIds.has(String(note.id)) || window._ownedNoteIds.has(note.title));
  const btn = owned
    ? `<button class="nc-btn" style="background:#16a34a;" onclick="event.stopPropagation();location.href='settings.html#mynotes'">Owned</button>`
    : `<button class="nc-btn" onclick="event.stopPropagation();cartAdd({id:${note.id},title:'${note.title.replace(/'/g,"\\'").replace(/"/g,'&quot;')}',price:${note.price}});this.textContent='✓ Added'">Add to Cart</button>`;
  return `<div class="note-card visible" onclick="location.href='note-details.html?id=${note.id}'">
    ${cover}
    <div class="nc-body">
      <div class="nc-tags"><span class="nc-tag">Class ${note.cls}</span><span class="nc-tag nc-tag-alt">${note.board||'JEE'}</span></div>
      <p class="nc-title">${note.title}</p>
      <div class="nc-footer">
        <div><span class="nc-price">₹${note.price}</span><span class="nc-price-sub"> one-time</span></div>
        ${btn}
      </div>
    </div>
  </div>`;
}

function renderSections() {
  const isJee = currentCls === '11' || currentCls === '12';
  const boardKey = isJee ? 'JEE' : currentBoard;
  const subjects = isJee ? SUBJECTS_JEE : SUBJECTS_6_10;
  const list = activeSub === 'all' ? subjects : [activeSub];

  let html = '';
  list.forEach(sub => {
    const notes = CATALOG[currentCls]?.[boardKey]?.[sub] ?? [];
    if (activeSub === 'all') {
      html += `<div class="notes-section">
        <div class="notes-section-hd">
          <span class="nsh-icon">${SUBJECT_ICONS[sub]||'📚'}</span>
          <span class="nsh-name">${sub}</span>
          ${notes.length ? `<span class="nsh-badge">${notes.length}</span>` : ''}
        </div>`;
    } else {
      html += `<div class="notes-section">`;
    }
    if (notes.length) {
      html += `<div class="notes-grid">${notes.map(noteCard).join('')}</div>`;
    } else {
      html += `<div class="notes-coming-soon">🚧 <strong>${sub}</strong> notes are being prepared.</div>`;
    }
    html += `</div>`;
  });

  document.getElementById('sections-wrap').innerHTML = html;
  document.getElementById('sections-wrap').style.display = 'block';
  document.getElementById('placeholder').style.display = 'none';
}

function renderSubjectRow() {
  const isJee = currentCls === '11' || currentCls === '12';
  const boardKey = isJee ? 'JEE' : currentBoard;
  const subjects = isJee ? SUBJECTS_JEE : SUBJECTS_6_10;
  const total = subjects.reduce((s,sub) => s + (CATALOG[currentCls]?.[boardKey]?.[sub]?.length||0), 0);

  let html = `<button class="sub-chip${activeSub==='all'?' active':''}" onclick="setSub('all')">All <span class="sub-chip-count">${total}</span></button>`;
  subjects.forEach(sub => {
    const c = CATALOG[currentCls]?.[boardKey]?.[sub]?.length||0;
    html += `<button class="sub-chip${activeSub===sub?' active':''}" onclick="setSub('${sub}')">${SUBJECT_ICONS[sub]} ${sub}${c?` <span class="sub-chip-count">${c}</span>`:''}</button>`;
  });
  document.getElementById('subject-row').innerHTML = html;
  document.getElementById('subject-row-wrap').style.display = 'block';
}

function setSub(sub) {
  activeSub = sub;
  renderSubjectRow();
  renderSections();
}

function selectClass(cls) {
  currentCls = cls; activeSub = 'all';
  document.querySelectorAll('.ctab').forEach(b => b.classList.toggle('active', b.dataset.cls === cls));
  const isJee = cls === '11' || cls === '12';
  const boardRow = document.getElementById('board-row');
  if (isJee) {
    boardRow.style.display = 'none';
    currentBoard = null;
    renderSubjectRow();
    renderSections();
  } else {
    boardRow.style.display = 'flex';
    document.querySelectorAll('.board-chip').forEach(b => b.classList.remove('active'));
    document.getElementById('subject-row-wrap').style.display = 'none';
    document.getElementById('sections-wrap').style.display = 'none';
    document.getElementById('placeholder').style.display = 'flex';
    currentBoard = null;
  }
}

document.getElementById('class-filter-row').addEventListener('click', async e => {
  const btn = e.target.closest('.cls-filter');
  if (!btn) return;
  document.querySelectorAll('.cls-filter').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const group = btn.dataset.group;
  sessionStorage.setItem('an-cls-filter', group);
  applyClsFilter(group);
  try {
    const { auth, db } = await import(new URL('../assets/firebase.js', location.href).href);
    const { doc, setDoc } = await import('https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js');
    if (auth.currentUser) await setDoc(doc(db, 'users', auth.currentUser.uid), { clsFilter: group }, { merge: true });
  } catch(e) {}
});

function applyClsFilter(group) {
  document.querySelectorAll('.ctab').forEach(tab => {
    const cls = tab.dataset.cls;
    const show = group === 'all'
      || (group === 'foundation' && ['6','7','8'].includes(cls))
      || (group === 'board'      && ['9','10'].includes(cls))
      || (group === 'jee'        && ['11','12'].includes(cls));
    tab.style.display = show ? '' : 'none';
  });
}

// Apply immediately from sessionStorage, then sync from Firestore
(function(){
  const cached = sessionStorage.getItem('an-cls-filter') || 'all';
  const btn = document.querySelector(`.cls-filter[data-group="${cached}"]`);
  if (btn) { document.querySelectorAll('.cls-filter').forEach(b => b.classList.remove('active')); btn.classList.add('active'); }
  applyClsFilter(cached);
})();

(async () => {
  try {
    const { auth, db } = await import(new URL('../assets/firebase.js', location.href).href);
    const { onAuthStateChanged } = await import('https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js');
    const { doc, getDoc } = await import('https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js');
    onAuthStateChanged(auth, async user => {
      if (!user) return;
      const snap = await getDoc(doc(db, 'users', user.uid));
      const group = snap.exists() && snap.data().clsFilter || 'all';
      sessionStorage.setItem('an-cls-filter', group);
      const btn = document.querySelector(`.cls-filter[data-group="${group}"]`);
      if (btn) { document.querySelectorAll('.cls-filter').forEach(b => b.classList.remove('active')); btn.classList.add('active'); }
      applyClsFilter(group);
    });
  } catch(e) {}
})();

document.querySelectorAll('.ctab').forEach(b => b.addEventListener('click', () => {
  if (b.classList.contains('ctab-soon')) {
    showToast(`Notes for Class ${b.dataset.cls} coming soon`);
    return;
  }
  selectClass(b.dataset.cls);
}));

document.querySelectorAll('.board-chip').forEach(b => b.addEventListener('click', function() {
  // Check if CBSE is clicked for class 10
  if (this.dataset.board === 'CBSE' && currentCls === '10') {
    showToast('CBSE Class 10 notes coming soon');
    return;
  }
  
  document.querySelectorAll('.board-chip').forEach(x => x.classList.remove('active'));
  this.classList.add('active');
  currentBoard = this.dataset.board;
  activeSub = 'all';
  renderSubjectRow();
  renderSections();
}));

new MutationObserver(() => {
  document.querySelectorAll('.nc-cover img').forEach(img => {
    img.src = isDark() ? img.dataset.dark : img.dataset.light;
  });
}).observe(document.documentElement, { attributes: true, attributeFilter: ['data-theme'] });
</script>
</body>
</html>
