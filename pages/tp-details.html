<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test Paper – AceNotes</title>
<link rel="icon" type="image/png" href="../assets/avatars/LOGO.png">
<link rel="manifest" href="/home/manifest.json">
<meta name="theme-color" content="#0f1117">
<script>(function(){var t=null;try{t=localStorage.getItem('acenotes-theme');}catch(e){}if(!t){var m=document.cookie.match(/acenotes-theme=(dark|light)/);if(m)t=m[1];}if(t==='dark')document.documentElement.setAttribute('data-theme','dark');})()</script>
<link rel="stylesheet" href="../assets/css/base.css">
<link rel="stylesheet" href="../assets/css/note-details.css">
</head>
<body>

<div id="navbar-mount"></div>

<section class="nd-page">
<div class="container">
  <nav class="nd-breadcrumb">
    <a href="test-papers.html">Test Papers</a>
    <span>›</span>
    <span id="bc-class"></span>
    <span>›</span>
    <span id="bc-title"></span>
  </nav>

  <div class="nd-layout">
    <div class="nd-left">
      <div class="nd-subject-tag">📝 Test Paper Bundle</div>
      <h1 class="nd-title" id="nd-title"></h1>
      <div class="nd-meta-row" id="nd-meta-row"></div>

      <div class="nd-section">
        <div class="nd-section-title">About This Bundle</div>
        <p class="nd-description" id="nd-description"></p>
      </div>

      <div class="nd-section">
        <div class="nd-section-title">What's Included</div>
        <ul class="nd-features" id="nd-features"></ul>
      </div>

      <div class="nd-section">
        <div class="nd-section-title">Specifications</div>
        <div class="nd-specs-grid" id="nd-specs"></div>
      </div>
    </div>

    <div class="nd-right">
      <div class="nd-sticky">
        <div class="nd-card">
          <div class="nd-img-wrap">
            <div class="nd-img-placeholder">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z"/></svg>
              <span id="nd-img-label"></span>
            </div>
          </div>
          <div class="nd-card-body">
            <div class="nd-price-row">
              <span class="nd-price" id="nd-price"></span>
              <span class="nd-price-label">one-time</span>
            </div>
            <div class="nd-actions">
              <a id="nd-whatsapp-btn" href="#" target="_blank" class="nd-btn-cart">🛒 Order via WhatsApp</a>
              <a href="test-papers.html" class="nd-btn-back">← Back to Test Papers</a>
            </div>
            <div class="nd-card-divider"></div>
            <div class="nd-trust-row">
              <div class="nd-trust-item">
                <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75m-3-7.036A11.959 11.959 0 013.598 6 11.99 11.99 0 003 9.749c0 5.592 3.824 10.29 9 11.623 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.571-.598-3.751h-.152c-3.196 0-6.1-1.248-8.25-3.285z"/></svg>
                Secure digital delivery
              </div>
              <div class="nd-trust-item">
                <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 13.5l10.5-11.25L12 10.5h8.25L9.75 21.75 12 13.5H3.75z"/></svg>
                Instant access after approval
              </div>
              <div class="nd-trust-item">
                <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6h4.5m4.5 0a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                Lifetime access once purchased
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
</section>

<script src="../assets/acenotes.js"></script>
<script>
renderNavbar({ base: '../', cur: 'testpapers' });

const params = new URLSearchParams(location.search);
const paper = TEST_PAPERS.find(p => p.id === params.get('id'));

if (!paper) {
  location.href = 'test-papers.html';
} else {
  document.title = paper.title + ' – AceNotes';

  document.getElementById('bc-class').textContent = 'Class ' + paper.cls + ' ' + paper.board;
  document.getElementById('bc-title').textContent = paper.title;
  document.getElementById('nd-title').textContent = paper.title;
  document.getElementById('nd-img-label').textContent = paper.title.match(/Bundle \d/)[0] + ' · ' + paper.papers + ' Papers';

  document.getElementById('nd-meta-row').innerHTML = `
    <div class="nd-meta-pill">🎓 <strong>Class ${paper.cls} – ${paper.board}</strong></div>
    <div class="nd-meta-pill">📦 <strong>${paper.papers} Papers</strong></div>
    <div class="nd-meta-pill">📄 <strong>Digital PDF</strong></div>`;

  document.getElementById('nd-description').textContent = paper.desc;
  document.getElementById('nd-features').innerHTML = paper.features.map(f => `<li>${f}</li>`).join('');

  document.getElementById('nd-specs').innerHTML = [
    { label: 'Class',   value: 'Class ' + paper.cls },
    { label: 'Board',   value: paper.board },
    { label: 'Papers',  value: paper.papers },
    { label: 'Format',  value: 'Digital PDF' },
    { label: 'Access',  value: 'Instant after approval' },
    { label: 'Price',   value: '₹' + paper.price },
  ].map(s => `<div class="nd-spec-item"><div class="nd-spec-label">${s.label}</div><div class="nd-spec-value">${s.value}</div></div>`).join('');

  document.getElementById('nd-price').textContent = '₹' + paper.price;

  const msg = `Hello, I would like to order:\n\n${paper.title}\nPrice: ₹${paper.price}\n\nPlease confirm and provide payment details.`;
  document.getElementById('nd-whatsapp-btn').href = 'https://wa.me/919163164555?text=' + encodeURIComponent(msg);
}
</script>
</body>
</html>
