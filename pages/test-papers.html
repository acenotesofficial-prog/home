<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test Papers – AceNotes</title>
<link rel="icon" type="image/png" href="../assets/avatars/Sqare_logo.png">
<link rel="manifest" href="/home/manifest.json">
<meta name="theme-color" content="#0f1117">
<script>(function(){var t=null;try{t=localStorage.getItem('acenotes-theme');}catch(e){}if(!t){var m=document.cookie.match(/acenotes-theme=(dark|light)/);if(m)t=m[1];}if(t==='dark')document.documentElement.setAttribute('data-theme','dark');})()</script>
<link rel="stylesheet" href="../assets/css/base.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
  .tp-page {
    min-height: 100vh;
    padding-top: calc(var(--navbar-h) + 48px);
    padding-bottom: 80px;
  }
  /* ── hero ── */
  .tp-hero {
    text-align: center;
    margin-bottom: 56px;
  }
  .tp-hero-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--accent-soft);
    border: 1px solid var(--accent-border);
    color: var(--accent);
    font-size: 12px;
    font-weight: 700;
    padding: 5px 14px;
    border-radius: 50px;
    margin-bottom: 18px;
    letter-spacing: .4px;
    text-transform: uppercase;
  }
  .tp-hero h1 {
    font-size: 42px;
    font-weight: 900;
    color: var(--text);
    letter-spacing: -1.5px;
    line-height: 1.15;
    margin-bottom: 14px;
  }
  .tp-hero h1 span { color: var(--accent); }
  .tp-hero p {
    font-size: 16px;
    color: var(--text-muted);
    max-width: 520px;
    margin: 0 auto;
    line-height: 1.7;
  }

  /* ── filter row ── */
  .tp-filter-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 36px;
  }
  .tp-chip {
    padding: 8px 20px;
    border-radius: 50px;
    border: 1.5px solid var(--border);
    background: var(--bg-soft);
    color: var(--text);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all .18s;
    white-space: nowrap;
  }
  .tp-chip:hover { border-color: var(--text-faint); }
  .tp-chip.active { background: var(--accent); border-color: var(--accent); color: #fff; box-shadow: 0 4px 12px rgba(78,110,242,.3); }

  /* ── grid ── */
  .tp-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 24px;
  }

  /* ── card ── */
  .tp-card {
    background: var(--bg-card);
    border: 1.5px solid var(--border);
    border-radius: 18px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    box-shadow: 0 2px 12px var(--shadow);
    transition: transform .25s cubic-bezier(.4,0,.2,1), box-shadow .25s, border-color .25s;
    opacity: 0;
    transform: translateY(16px);
  }
  .tp-card.visible { opacity: 1; transform: translateY(0); }
  .tp-card:hover { transform: translateY(-5px); box-shadow: 0 18px 44px var(--shadow); border-color: var(--accent-border); }

  .tp-card-top {
    padding: 22px 22px 0;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
  }
  .tp-card-icon {
    width: 52px; height: 52px;
    border-radius: 14px;
    background: var(--accent-soft);
    border: 1.5px solid var(--accent-border);
    display: flex; align-items: center; justify-content: center;
    font-size: 24px;
    flex-shrink: 0;
  }
  .tp-card-tags { display: flex; gap: 5px; flex-wrap: wrap; justify-content: flex-end; }
  .tp-tag {
    font-size: 10px; font-weight: 700;
    padding: 3px 9px; border-radius: 6px;
    background: var(--accent-soft); color: var(--accent);
    border: 1px solid var(--accent-border);
  }
  .tp-tag-amber { background: #fffbeb; color: #b45309; border-color: #fde68a; }
  [data-theme="dark"] .tp-tag-amber { background: #2d1f00; color: #fbbf24; border-color: #78350f; }

  .tp-card-body { padding: 16px 22px 20px; flex: 1; display: flex; flex-direction: column; }
  .tp-card-title { font-size: 15px; font-weight: 800; color: var(--text); line-height: 1.45; margin-bottom: 8px; }
  .tp-card-desc { font-size: 13px; color: var(--text-muted); line-height: 1.6; flex: 1; margin-bottom: 16px; }

  .tp-card-meta {
    display: flex; gap: 14px; margin-bottom: 18px;
    padding: 12px 14px;
    background: var(--bg-soft);
    border-radius: 10px;
    border: 1px solid var(--border-soft);
  }
  .tp-meta-item { display: flex; flex-direction: column; gap: 2px; }
  .tp-meta-label { font-size: 10px; font-weight: 600; color: var(--text-faint); text-transform: uppercase; letter-spacing: .4px; }
  .tp-meta-val { font-size: 13px; font-weight: 700; color: var(--text); }

  .tp-card-footer {
    display: flex; align-items: center; justify-content: space-between; gap: 10px;
    padding-top: 14px;
    border-top: 1px solid var(--border-soft);
    margin-top: auto;
  }
  .tp-price { font-size: 22px; font-weight: 900; color: var(--accent); }
  .tp-price-sub { font-size: 10px; color: var(--text-faint); font-weight: 500; }
  .tp-btn {
    padding: 10px 20px;
    background: var(--accent);
    color: #fff; border: none;
    border-radius: 10px;
    font-size: 13px; font-weight: 700;
    cursor: pointer;
    transition: all .2s;
    white-space: nowrap;
    display: flex; align-items: center; gap: 6px;
  }
  .tp-btn:hover { background: #3d5ce8; transform: translateY(-1px); box-shadow: 0 6px 16px rgba(78,110,242,.35); }
  .tp-btn:disabled { background: var(--bg-soft); color: var(--text-faint); border: 1.5px solid var(--border); cursor: not-allowed; }
  .tp-btn:disabled:hover { background: var(--bg-soft); color: var(--text-faint); transform: none; box-shadow: none; }

  /* Dropdown select */
  .tp-dropdown-wrap {
    padding: 0 22px;
    margin-bottom: 12px;
  }
  .tp-select {
    width: 100%;
    padding: 8px 12px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    background: var(--bg-soft);
    color: var(--text);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: border-color .2s;
    outline: none;
  }
  .tp-select:focus { border-color: var(--accent); }

  /* ── coming soon card ── */
  .tp-card-soon { opacity: .55; }
  .tp-card-soon .tp-btn { background: var(--bg-soft); color: var(--text-faint); border: 1.5px solid var(--border); }
  .tp-card-soon .tp-select { pointer-events: auto; opacity: 1; }

  /* ── empty state ── */
  .tp-empty {
    grid-column: 1/-1;
    display: flex; flex-direction: column; align-items: center;
    padding: 60px 20px; gap: 12px; text-align: center;
  }
  .tp-empty-icon { font-size: 52px; opacity: .35; }
  .tp-empty h3 { font-size: 18px; font-weight: 800; color: var(--text); }
  .tp-empty p { font-size: 14px; color: var(--text-faint); }

  /* ── info banner ── */
  .tp-banner {
    display: flex; align-items: center; gap: 14px;
    background: var(--accent-soft);
    border: 1.5px solid var(--accent-border);
    border-radius: 14px;
    padding: 16px 22px;
    margin-bottom: 36px;
    font-size: 14px; color: var(--text-muted); line-height: 1.6;
  }
  .tp-banner-icon { font-size: 22px; flex-shrink: 0; }

  @media (max-width: 768px) {
    .tp-hero h1 { font-size: 30px; }
    .tp-grid { grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 16px; }
  }
  @media (max-width: 540px) {
    .tp-page { padding-top: calc(var(--navbar-h) + 24px); }
    .tp-hero { margin-bottom: 32px; }
    .tp-hero h1 { font-size: 24px; letter-spacing: -.5px; }
    .tp-hero p { font-size: 14px; }
    .tp-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div id="navbar-mount"></div>

<main class="tp-page">
  <div class="container">

    <div class="tp-hero">
      <div class="tp-hero-badge">📝 New</div>
      <h1>Test Papers <span></span> Store</h1>
      <p>Full-length practice test papers crafted by expert educators. Download, print, and practice — just like the real exam.</p>
    </div>

    <div class="tp-filter-row" id="tp-filters">
      <button class="tp-chip active" data-filter="all">All</button>
      <button class="tp-chip" data-filter="6-8">Class 6–8</button>
      <button class="tp-chip" data-filter="9-10">Class 9–10</button>
      <button class="tp-chip" data-filter="11-12">Class 11–12</button>
      <button class="tp-chip" data-filter="jee">JEE</button>
    </div>

    <div class="tp-grid" id="tp-grid">
      <!-- Cards injected by JS -->
    </div>

  </div>
</main>

<script src="../assets/acenotes.js"></script>
<script>
renderNavbar({ base: '../', cur: 'testpapers' });

const TEST_PAPERS = [
  {
    id: 'tp1',
    icon: '📝',
    title: 'JEE Main Mock Test Series',
    desc: 'Comprehensive mock test series for JEE Main preparation. Practice with 25 test papers with varies syllabus designed to simulate the actual exam experience.',
    tags: ['JEE', '25 Papers', 'Mock Tests'],
    tagStyle: ['', '', ''],
    price: 999,
    filter: 'jee',
    soon: true,
  },
  {
    id: 'tp2',
    icon: '📚',
    title: 'JEE Chapter Wise Mock Test',
    desc: 'Chapter-wise mock tests covering all important topics. Select your class to see available tests and pricing.',
    tags: ['JEE', 'Chapter Wise', 'Mock Tests'],
    tagStyle: ['', '', ''],
    filter: 'jee',
    soon: true,
    hasDropdown: true,
    options: [
      { label: 'Class 11', value: 'c11', price: 499, tests: 96 },
      { label: 'Class 12', value: 'c12', price: 599, tests: 94 },
      { label: 'Combined Package (Class 11+12)', value: 'c11-12', price: 999, tests: 190 },
    ],
  },
];

function renderCards(filter) {
  const grid = document.getElementById('tp-grid');
  const filtered = filter === 'all' ? TEST_PAPERS : TEST_PAPERS.filter(p => p.filter === filter);
  if (!filtered.length) {
    grid.innerHTML = `<div class="tp-empty"><div class="tp-empty-icon">📭</div><h3>Nothing here yet</h3><p>More papers coming soon. Check back later!</p></div>`;
    return;
  }
  grid.innerHTML = filtered.map((p, i) => {
    const metaHTML = p.hasDropdown ? `
      <div class="tp-dropdown-wrap">
        <select class="tp-select" data-card="${p.id}" onchange="updateTpPrice('${p.id}')">
          ${p.options.map((opt, idx) => `<option value="${idx}"${idx === 0 ? ' selected' : ''}>${opt.label}</option>`).join('')}
        </select>
      </div>
      <div class="tp-card-meta">
        <div class="tp-meta-item"><span class="tp-meta-label">Papers</span><span class="tp-meta-val" id="tp-papers-${p.id}">${p.options[0].tests}</span></div>
        <div class="tp-meta-item"><span class="tp-meta-label">Format</span><span class="tp-meta-val">PDF</span></div>
        <div class="tp-meta-item"><span class="tp-meta-label">Access</span><span class="tp-meta-val">Lifetime</span></div>
      </div>
    ` : `
      <div class="tp-card-meta">
        <div class="tp-meta-item"><span class="tp-meta-label">Papers</span><span class="tp-meta-val">25</span></div>
        <div class="tp-meta-item"><span class="tp-meta-label">Format</span><span class="tp-meta-val">PDF</span></div>
        <div class="tp-meta-item"><span class="tp-meta-label">Access</span><span class="tp-meta-val">Lifetime</span></div>
      </div>
    `;

    const footerHTML = p.hasDropdown ? `
      <div class="tp-card-footer">
        <div>
          <div class="tp-price" id="tp-price-${p.id}">₹---</div>
          <div class="tp-price-sub" id="tp-price-sub-${p.id}">Select a package above</div>
        </div>
        <button class="tp-btn" id="tp-btn-${p.id}" onclick="${p.soon ? `showTpToast('${p.title} coming soon'); return false;` : `handleTpBuy('${p.id}')`}" ${p.soon ? 'disabled' : ''}>
          ${p.soon ? 'Coming Soon' : '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> Buy PDF'}
        </button>
      </div>
    ` : `
      <div class="tp-card-footer">
        <div>
          <div class="tp-price">₹${p.price}</div>
          <div class="tp-price-sub">one-time · PDF</div>
        </div>
        <button class="tp-btn" onclick="${p.soon ? 'showTpToast(\'JEE Main Mock Test Series coming soon\'); return false;' : `location.href='tp-details.html?id=${p.id}'`} ">
          ${p.soon ? 'Coming Soon' : '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> Buy PDF'}
        </button>
      </div>
    `;

    return `
    <div class="tp-card${p.soon ? ' tp-card-soon' : ''}" style="transition-delay:${i * 60}ms">
      <div class="tp-card-top">
        <div class="tp-card-icon">${p.icon}</div>
        <div class="tp-card-tags">
          ${p.tags.map((t, ti) => `<span class="tp-tag ${p.tagStyle[ti]||''}">${t}</span>`).join('')}
          ${p.soon ? '<span class="tp-tag" style="background:var(--bg-soft);color:var(--text-faint);border-color:var(--border);">Soon</span>' : ''}
        </div>
      </div>
      <div class="tp-card-body">
        <div class="tp-card-title">${p.title}</div>
        <div class="tp-card-desc">${p.desc}</div>
        ${metaHTML}
        ${footerHTML}
      </div>
    </div>`;
  }).join('');

  requestAnimationFrame(() => {
    grid.querySelectorAll('.tp-card').forEach(c => requestAnimationFrame(() => c.classList.add('visible')));
  });

  // Set default selection for dropdown cards
  filtered.filter(p => p.hasDropdown).forEach(p => {
    updateTpPrice(p.id);
  });
}

// Filter chips
document.getElementById('tp-filters').addEventListener('click', e => {
  const chip = e.target.closest('.tp-chip');
  if (!chip) return;
  document.querySelectorAll('.tp-chip').forEach(c => c.classList.remove('active'));
  chip.classList.add('active');
  renderCards(chip.dataset.filter);
});

renderCards('all');

// Update price when dropdown selection changes
function updateTpPrice(cardId) {
  const select = document.querySelector(`select[data-card="${cardId}"]`);
  const selectedIdx = select.value;
  const card = TEST_PAPERS.find(p => p.id === cardId);
  
  if (!card || selectedIdx === '') {
    document.getElementById(`tp-price-${cardId}`).textContent = '₹---';
    document.getElementById(`tp-price-sub-${cardId}`).textContent = 'Select a package above';
    document.getElementById(`tp-papers-${cardId}`).textContent = '---';
    document.getElementById(`tp-btn-${cardId}`).disabled = true;
    return;
  }
  
  const option = card.options[parseInt(selectedIdx)];
  document.getElementById(`tp-price-${cardId}`).textContent = `₹${option.price}`;
  document.getElementById(`tp-price-sub-${cardId}`).textContent = `${option.tests} Tests · PDF · Lifetime`;
  document.getElementById(`tp-papers-${cardId}`).textContent = option.tests;
  document.getElementById(`tp-btn-${cardId}`).disabled = false;
}

// Handle buy button click
function handleTpBuy(cardId) {
  const select = document.querySelector(`select[data-card="${cardId}"]`);
  const selectedIdx = select.value;
  const card = TEST_PAPERS.find(p => p.id === cardId);
  
  if (!card || selectedIdx === '') {
    showTpToast('Please select a package first');
    return;
  }
  
  const option = card.options[parseInt(selectedIdx)];
  const msg = `Hello, I would like to order:\n\n${card.title}\nPackage: ${option.label}\nPrice: ₹${option.price}\nTests: ${option.tests}\n\nPlease confirm and provide payment details.`;
  window.open('https://wa.me/919163164555?text=' + encodeURIComponent(msg), '_blank');
}

// Toast notification for coming soon
function showTpToast(msg) {
  const t = document.createElement('div');
  t.id = 'tp-toast';
  t.textContent = msg;
  document.body.appendChild(t);
  requestAnimationFrame(() => t.classList.add('show'));
  setTimeout(() => {
    t.classList.remove('show');
    setTimeout(() => t.remove(), 300);
  }, 3000);
}

// Add toast styles
const toastStyle = document.createElement('style');
toastStyle.textContent = `
  #tp-toast {
    position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%) translateY(16px);
    background: var(--bg-card); color: var(--text); border: 1.5px solid var(--border);
    padding: 12px 24px; border-radius: 50px; font-size: 14px; font-weight: 600;
    box-shadow: 0 8px 24px var(--shadow); opacity: 0;
    transition: opacity .25s ease, transform .25s ease;
    pointer-events: none; z-index: 9999; white-space: nowrap;
  }
  #tp-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
`;
document.head.appendChild(toastStyle);

// Override button click for coming soon
document.addEventListener('click', function(e) {
  if (e.target.closest('.tp-btn') && e.target.closest('.tp-card-soon')) {
    e.preventDefault();
    showTpToast('JEE Main Mock Test Series coming soon');
  }
});
</script>
</body>
</html>
